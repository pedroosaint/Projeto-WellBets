<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/estilo.css">
    <title>WellBets</title>
</head>
<body>
    <header>
        <h1 id="Titulo"> Well Bets <span id="Destaque">2026</span></h1>
    </header>
    <main class ="container">
        <h2>Proximas Partidas</h2>
        
        <section class="grid-partidas">
            <article class="card">
                <h5>Brasil vs Haiti</h5>
                <p>21/06 - 21:30</p>
                <div class="input-partida">
                    <input type="number" min="0" max="10" placeholder="Brasil" id="time1-1">
                    <input type="number" min="0" max="10" placeholder="Haiti" id="time2-1">
                </div>
                <button onclick="salvarPalpite('Brasil vs Haiti', 1)" class="btn-palpite">Palpite</button>
            </article>
            
            <article class="card">
                <h5>Holanda vs Japão</h5>
                <p>21/06 - 21:30</p>
                <div class="input-partida">
                    <input type="number" min="0" max="10" placeholder="Holanda" id="time1-2">
                    <input type="number" min="0" max="10" placeholder="Japão" id="time2-2">
                </div>
                <button onclick="salvarPalpite('Holanda vs Japão', 2)" class="btn-palpite">Palpite</button>
        </section>
    </main>
    <footer>
        © - 2026 - Bolão
    </footer>
    <!-- JS EXTERNO -->
    <script src="./src/js/script.js"></script>
</body>
</html>
